[project]
name = "openlnk-eval"
version = "0.1.0"
description = "OpenLnk extraction eval harness — precision ≥97%, recall ≥85%"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10",
    "rich>=13.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "ruff>=0.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
